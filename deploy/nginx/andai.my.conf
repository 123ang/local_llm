# Adaptive Neural Decision AI — nginx reverse proxy for andai.my
# Install on the server: sudo cp andai.my.conf /etc/nginx/sites-available/andai.my
# sudo ln -sf /etc/nginx/sites-available/andai.my /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# After DNS points here, obtain TLS certs:
#   sudo certbot --nginx -d andai.my -d www.andai.my

# Upstreams (Next.js serves the UI; it rewrites /api/* to FastAPI on 127.0.0.1:8000)
upstream andai_next {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name andai.my www.andai.my;

    # Certbot will inject ssl_* and may add a second server block for HTTPS.
    # Until then, this block proxies HTTP (or use certbot --nginx to upgrade).

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://andai_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # LLM / uploads: match Next experimental.proxyTimeout (120s)
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    client_max_body_size 50M;
}
